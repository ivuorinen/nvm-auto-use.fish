---
name: PR Lint

on:
  push:
    branches-ignore: [master, main]
    # Remove the line above to run when pushing to master
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  SuperLinter:
    uses: ivuorinen/actions/pr-lint@a632fe582f131797b310daa2a6082c74b3d10074 # main
