---
name: PR Lint

permissions: {}

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
    branches: [master, main]

jobs:
  Lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      statuses: write
      issues: write
      pull-requests: write
    steps:
      - uses: ivuorinen/actions/pr-lint@84380fe01733b915ffea5892083ee636ed2b765a # v2026.05.04
