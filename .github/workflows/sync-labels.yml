---
name: Sync labels

permissions: {}

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-labels.yml
      - .github/labels.yml
  workflow_call:
  workflow_dispatch:

jobs:
  SyncLabels:
    permissions:
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: ivuorinen/actions/sync-labels@84380fe01733b915ffea5892083ee636ed2b765a # v2026.05.04
